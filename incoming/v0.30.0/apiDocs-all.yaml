          description: 응답 본문
      required:
      - header
    UpsertLiveFieldRequest:
      type: object
      description: 실시간 정보 행 upsert 요청 — 같은 label이면 값·신선도 갱신
      properties:
        label:
          type: string
          description: 정보 라벨
