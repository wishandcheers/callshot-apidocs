      - rating
      - reviewerId
      - submissionId
      - updatedAt
    ModifyUserProfileRequest:
      type: object
      description: 프로필 수정 요청 (관리자)
      properties:
        nickname:
          type: string
          description: 닉네임
          example: callshot_user
        avatarUrl:
          type: string
          description: 아바타 이미지 URL
        gender:
          type: string
          description: 성별
          enum:
          - MALE
          - FEMALE
          - UNKNOWN
          example: MALE
        birthdate:
          type: string
          format: date
          description: 생년월일
          example: 1995-03-15
        bio:
          type: string
          description: 자기소개
      required:
      - nickname
    PublishPhotoRequest:
      type: object
      description: Photo 생성 요청 (사진 메타데이터)
      properties:
        objectKey:
          type: string
          description: presigned URL 발급 시 받은 파일 키
          example: callshot/photos/abc123.jpg
        type:
          type: string
          description: 사진 유형
          enum:
          - STANDARD
          - SPHERICAL_360
          - PANORAMA
          - VIRTUAL_TOUR
          example: STANDARD
        width:
          type: integer
          format: int32
          description: 이미지 너비 (px)
          example: 1920
        height:
          type: integer
          format: int32
          description: 이미지 높이 (px)
          example: 1080
        longitude:
          type: number
          format: double
          description: GPS 경도
          example: 126.978
        latitude:
          type: number
          format: double
          description: GPS 위도
          example: 37.5665
        altitude:
          type: number
          format: double
          description: GPS 고도 (미터)
          example: 45.5
        direction:
          type: number
          format: double
          description: "촬영 방향 (라디안, 북쪽 기준 시계방향)"
          example: 1.5708
        description:
          type: string
          description: 사진 설명
          example: 서울 남산타워에서 촬영
        hashtags:
          type: array
          description: 해시태그 목록
          example:
          - 서울
          - 남산타워
          items:
            type: string
        topicIds:
          type: array
          description: 매핑할 테마 ID 목록 (선택)
          items:
            type: integer
            format: int64
        placeId:
          type: integer
          format: int64
          description: 매핑할 장소카드 ID (선택 — 장소/물건 테마의 특정 장소에 붙일 때)
      required:
      - hashtags
      - height
      - objectKey
      - topicIds
      - type
      - width
    AccessUrl:
      type: object
      properties:
        accessUrl:
          type: string
        expiresAt:
          type: integer
          format: int64
      required:
      - accessUrl
    BaseResponseAccessUrl:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          $ref: "#/components/schemas/AccessUrl"
          description: 응답 본문
      required:
      - header
    PresignedUrlRequest:
      type: object
      description: UPLOAD URL 발급 요청 정보
      properties:
        fileName:
          type: string
          description: 업로드할 파일명
          example: photo_001.jpg
        contentType:
          type: string
          description: 파일 MIME 타입
          example: image/jpeg
      required:
      - contentType
      - fileName
    BaseResponsePresignedUrlResponse:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          $ref: "#/components/schemas/PresignedUrlResponse"
          description: 응답 본문
      required:
      - header
    PresignedUrlResponse:
      type: object
      description: Presigned URL 발급 응답
      properties:
        uploadUrl:
          type: string
          description: GCS 업로드용 presigned URL
        fileKey:
          type: string
          description: 업로드 파일 키 (업로드 완료 시 사용)
          example: callshot/photos/abc123.jpg
        expiresAt:
          type: string
          description: URL 만료 시각 (epoch millis)
          example: 1708300800000
      required:
      - expiresAt
      - fileKey
      - uploadUrl
    CompleteUploadRequest:
      type: object
      description: 업로드 완료 요청 (objectKey)
      properties:
        objectKey:
          type: string
          description: presigned URL 발급 시 받은 파일 키
          example: callshot/photos/abc123.jpg
      required:
      - objectKey
    RegisterStampSpotRequest:
      type: object
      description: 등록할 스탬프 스팟
      properties:
        name:
          type: string
          description: 스팟 이름
          example: 수성동 계곡
          maxLength: 200
          minLength: 0
        hint:
          type: string
          description: 촬영 가이드 (항상 공개)
          example: 정자 앞 계곡 전경이 보이게 찍어주세요
          maxLength: 500
          minLength: 0
        hiddenDesc:
          type: string
          description: 숨겨진 이야기 — 스탬프 획득자에게만 공개
        longitude:
          type: number
          format: double
          description: 경도
          example: 126.9686
        latitude:
          type: number
          format: double
          description: 위도
          example: 37.5804
        direction:
          type: number
          format: double
          description: "권장 촬영 방향 (degrees 0~360, 옵션 — 표시용)"
        placeId:
          type: integer
          format: int64
          description: "canonical POI 참조 (장소 검색으로 위치를 고른 경우, 옵션)"
      required:
      - latitude
      - longitude
      - name
    RegisterTopicRequest:
      type: object
      description: 테마 생성 요청 (디자인 '테마 만들기' 폼). 카테고리는 클라가 명시(장소카드 기능→PLACE 등 추론 규칙은
        클라 적용)
      properties:
        name:
          type: string
          description: 테마명 (# 없이)
          example: 제주여행기
          maxLength: 200
          minLength: 0
        category:
          type: string
          description: 카테고리
          enum:
          - INCIDENT
          - PLACE
          - PRODUCT
          example: INCIDENT
        description:
          type: string
          description: 설명
          example: 이 테마가 무엇을 모으는지
        scope:
          type: string
          description: 참여 범위 (공공/개인)
          enum:
          - PUBLIC
          - PERSONAL
          example: PUBLIC
        icon:
          type: string
          description: 대표 이모지 아이콘
          example: ✈️
        features:
          type: array
          description: 활성화 기능 (복수 선택)
          example:
          - TIMELINE
          - PLACE_CARDS
          items:
            type: string
            enum:
            - TIMELINE
            - PLACE_CARDS
            - NEWS
            - ROUTE
            - STATS
            - STAMP
          uniqueItems: true
        liveFieldPresets:
          type: array
          description: 장소카드 실시간 정보 라벨 프리셋
          example:
          - 메뉴·가격
          - 대기줄
          items:
            type: string
        outlinkUrl:
          type: string
          description: 외부 링크
        longitude:
          type: number
          format: double
          description: 테마 중심 경도 (선택)
        latitude:
          type: number
          format: double
          description: 테마 중심 위도 (선택)
        eventStart:
          type: string
          format: date-time
          description: 이벤트 시작 (EVENT성 테마)
        eventEnd:
          type: string
          format: date-time
          description: 이벤트 종료
        stampSpots:
          type: array
          description: 스탬프 스팟 목록 — features에 STAMP 포함 시 1개 이상 필수. 순번은 배열 순서
          items:
            $ref: "#/components/schemas/RegisterStampSpotRequest"
      required:
      - category
      - features
      - liveFieldPresets
      - name
      - scope
      - stampSpots
    BaseResponseTopicResponse:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          $ref: "#/components/schemas/TopicResponse"
          description: 응답 본문
      required:
      - header
    PromotionProgressResponse:
      type: object
      description: "승격 진행 지표 (Ops Console 후보 큐 — 진행률 바, '남은 조건 사진 7 · 유저 3' 렌더링용)"
      properties:
        photoCount:
          type: integer
          format: int32
          description: PUBLISHED 사진 수 (실측 — denormalized photoCount와 다를 수 있음)
        requiredPhotoCount:
          type: integer
          format: int32
        uniqueUserCount:
          type: integer
          format: int32
          description: 고유 참여(업로더) 유저 수
        requiredUniqueUserCount:
          type: integer
          format: int32
        geoZoneCount:
          type: integer
          format: int32
          description: 지리 분산 — 사진들이 걸친 구역 수
        requiredGeoZoneCount:
          type: integer
          format: int32
        progress:
          type: number
          format: double
          description: "진행률 0.0~1.0 (세 지표 비율 평균, 각 100% 상한). 0.9 이상 = 승격 임박"
      required:
      - geoZoneCount
      - photoCount
      - progress
      - requiredGeoZoneCount
      - requiredPhotoCount
      - requiredUniqueUserCount
      - uniqueUserCount
    TopicResponse:
      type: object
      description: 테마 응답
      properties:
        id:
          type: string
        category:
          type: string
          enum:
          - INCIDENT
          - PLACE
          - PRODUCT
        name:
          type: string
        description:
          type: string
        scope:
          type: string
          enum:
          - PUBLIC
          - PERSONAL
        status:
          type: string
          enum:
          - CANDIDATE
          - ACTIVE
          - PENDING_REVIEW
          - HIDDEN
          - ARCHIVED
        icon:
          type: string
        features:
          type: array
          items:
            type: string
            enum:
            - TIMELINE
            - PLACE_CARDS
            - NEWS
            - ROUTE
            - STATS
            - STAMP
          uniqueItems: true
        liveFieldPresets:
          type: array
          items:
            type: string
        outlinkUrl:
          type: string
        photoCount:
          type: integer
          format: int32
        likeCount:
          type: integer
          format: int32
        bookmarkCount:
          type: integer
