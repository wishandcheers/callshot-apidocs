        messageAllowed:
          type: boolean
          description: 메시지 수신 허용 여부
      required:
      - emailEnabled
      - emailPublic
      - locationVisible
      - messageAllowed
      - missionEnabled
      - profilePublic
      - pushEnabled
    UpdateUserProfileRequest:
      type: object
      description: 프로필 수정 요청 정보
      properties:
        nickname:
          type: string
          description: 닉네임
