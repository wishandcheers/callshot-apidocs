        required: false
        schema:
          type: integer
          format: int32
          default: 1
      - name: size
        in: query
        description: "페이지 크기 (기본 20, 최대 100)"
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          description: 조회 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseExternalEventPageResponse"
  /api/signout:
    delete:
      tags:
      - 인증
      summary: 사용자 탈퇴
      description: 현재 인증된 사용자의 프로필 정보를 삭제합니다. (개발용)
      operationId: signout
      responses:
        "200":
          description: 사용자 탈퇴 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUnit"
  /api/photo-requests/{requestId}/submissions/{submissionId}:
    delete:
      tags:
      - 촬영 의뢰
      summary: 사진 제출 철회
      description: 촬영 의뢰에 제출한 사진을 철회합니다. PENDING 상태인 제출만 철회할 수 있습니다.
      operationId: withdrawSubmission-shnmnJ8
      parameters:
      - name: requestId
        in: path
        description: 촬영 의뢰 ID
        required: true
        schema:
          type: string
      - name: submissionId
        in: path
        description: 제출 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: 철회 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseSubmissionResponse"
  /api/admin/photos/seed/{source}:
    delete:
      tags:
      - Admin 사진 시딩
      summary: 소스별 시드 일괄 삭제
      description: 특정 소스로 적재된 모든 시드 사진과 연관 데이터(engagement/댓글 등)를 일괄 삭제한다.
      operationId: deleteBySource
      parameters:
      - name: source
        in: path
        required: true
        schema:
          type: string
          enum:
          - WIKIMEDIA
          - FLICKR
          - INATURALIST
          - MAPILLARY
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseSeedDeleteResponse"
components:
  schemas:
    Absent:
      allOf:
      - $ref: "#/components/schemas/PatchBoolean"
      - $ref: "#/components/schemas/PatchString"
      - $ref: "#/components/schemas/PatchInteger"
    Clear:
      allOf:
      - $ref: "#/components/schemas/PatchBoolean"
      - $ref: "#/components/schemas/PatchString"
      - $ref: "#/components/schemas/PatchInteger"
    PatchBoolean: {}
    UpdateUserSettingsRequest:
      type: object
      description: 설정 수정 요청 정보
      properties:
        pushEnabled:
          description: 푸시 알림 허용 여부
          oneOf:
          - $ref: "#/components/schemas/Absent"
          - $ref: "#/components/schemas/Clear"
          - $ref: "#/components/schemas/Value"
        emailEnabled:
          description: 이메일 알림 허용 여부
          oneOf:
          - $ref: "#/components/schemas/Absent"
          - $ref: "#/components/schemas/Clear"
          - $ref: "#/components/schemas/Value"
        missionEnabled:
          description: 미션 알림 허용 여부
          oneOf:
          - $ref: "#/components/schemas/Absent"
          - $ref: "#/components/schemas/Clear"
          - $ref: "#/components/schemas/Value"
        profilePublic:
          description: 프로필 공개 여부
          oneOf:
          - $ref: "#/components/schemas/Absent"
          - $ref: "#/components/schemas/Clear"
          - $ref: "#/components/schemas/Value"
        locationVisible:
          description: 위치 정보 공개 여부
          oneOf:
          - $ref: "#/components/schemas/Absent"
          - $ref: "#/components/schemas/Clear"
          - $ref: "#/components/schemas/Value"
        emailPublic:
          description: 이메일 주소 공개 여부
          oneOf:
          - $ref: "#/components/schemas/Absent"
          - $ref: "#/components/schemas/Clear"
          - $ref: "#/components/schemas/Value"
        messageAllowed:
          description: 메시지 수신 허용 여부
          oneOf:
          - $ref: "#/components/schemas/Absent"
          - $ref: "#/components/schemas/Clear"
          - $ref: "#/components/schemas/Value"
      required:
      - emailEnabled
      - emailPublic
      - locationVisible
      - messageAllowed
      - missionEnabled
      - profilePublic
      - pushEnabled
    Value:
      allOf:
      - $ref: "#/components/schemas/PatchBoolean"
      - type: object
        properties:
          value: {}
      - $ref: "#/components/schemas/PatchString"
      - $ref: "#/components/schemas/PatchInteger"
      required:
      - value
    BaseResponseUserSettingsResponse:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          $ref: "#/components/schemas/UserSettingsResponse"
          description: 응답 본문
      required:
      - header
    ResponseHeader:
      type: object
      description: 응답 헤더
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        code:
          type: integer
          format: int32
