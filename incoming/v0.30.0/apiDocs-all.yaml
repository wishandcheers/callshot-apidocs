openapi: 3.1.0
info:
  title: CallShot API
  description: |
    # API Guide
    This is a Api alpha-server for CallShot App.

    ## Common Rules
    - 인증이 필요한 API는 `Authorization: Bearer {id_token}` 헤더를 포함해야 합니다.

    ## CDN Guide
    - CDN URL 형식: `https://{cdn_host}/{path}`
        - cdn_host: `dev-cdn.call-shot.com`
    - Original URL path: `/origin/{file_path}`
        - ex: https://dev-cdn.call-shot.com/origin/times_square.jpg
    - Thumbnail URL path: /thumb/{file_path}?w={size}
        - Thumbnail URL의 경우 QueryString 없이 내려감
        - size: 썸네일 크기
        - ex: https://dev-cdn.call-shot.com/thumb/callshot/times_square.jpg?w=200
  version: 0.30.0
servers:
- url: https://dev-api.call-shot.com
  description: Development server
- url: http://localhost:8080
  description: Local server
tags:
- name: 개인 사진
  description: 개인 사진 관리 API (인증 필요)
- name: 즐겨찾기
  description: 즐겨찾기 목록 API
- name: Admin 테마
  description: 관리자 테마 후보 큐/승격/모더레이션 API
- name: 업로드
  description: 파일 업로드 관련 API
- name: 제출 리뷰
  description: 제출물 리뷰(별점) API
- name: Shutter
  description: 사용자 Shots 정보 API
- name: 공개 리뷰
  description: 공개 리뷰 조회 API
- name: 내 테마
  description: 내가 만든 테마 관리 API (인증 필요)
- name: Admin
  description: 관리자 전용 API
- name: 테마
  description: 테마(구조적 태깅) API
- name: Admin 사진 시딩
  description: 관리자 외부 오픈데이터 사진 시딩 API
- name: 사용자 설정
  description: 사용자 설정 관련 API
- name: 테마 반응
  description: "테마 좋아요, 북마크 API"
- name: Admin 외부 이벤트
  description: 관리자 공공데이터 이벤트 프록시 API
- name: 테마 댓글
  description: 테마 댓글 API
- name: 공개 프로필
  description: 공개 사용자 프로필 API
- name: Wallet
  description: 사용자 Film 지갑 API
- name: 공개 사진
  description: 공개 사진 브라우징 API (인증 불필요)
- name: 인증
  description: 사용자 인증 관련 API
- name: 스토리지
  description: 파일 스토리지 관련 API
- name: 임시저장 사진
  description: 임시저장 사진 워크플로우 API (소유자 권한)
- name: 댓글
  description: 댓글 API
- name: 해시태그
  description: 해시태그 관련 API
- name: 장소 검색
  description: 통합 장소 검색 (자체 DB + 카카오 보강)
- name: 내 촬영 의뢰
  description: 촬영 의뢰 관리 API (인증 필요)
- name: 반응
  description: "사진 좋아요, 싫어요 API"
- name: 스탬프 투어
  description: 스팟 사진 인증 + 진행/완주 API
- name: 장소카드
  description: 테마 장소카드(핀) API
- name: 촬영 의뢰
  description: 촬영 의뢰 조회 API
- name: Admin 미션
  description: 관리자 시스템 미션 관리 API
- name: 탐색
  description: Explore 피드 API
paths:
  /api/settings:
    get:
      tags:
      - 사용자 설정
      summary: 사용자 설정 조회
      description: 현재 인증된 사용자의 설정 정보를 조회합니다.
      operationId: getSettings
      responses:
        "200":
          description: 설정 조회 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUserSettingsResponse"
    put:
      tags:
      - 사용자 설정
      summary: 사용자 설정 수정
      description: 현재 인증된 사용자의 설정 정보를 수정합니다. 변경할 필드만 포함하면 됩니다.
      operationId: updateSettings
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserSettingsRequest"
        required: true
      responses:
        "200":
          description: 설정 수정 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUserSettingsResponse"
  /api/profile:
    get:
      tags:
      - 인증
      summary: 사용자 프로필 조회
      description: 현재 인증된 사용자의 프로필 정보를 조회합니다.
      operationId: profile
      responses:
        "200":
          description: 프로필 조회 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUserProfileResponse"
    put:
      tags:
      - 인증
      summary: 프로필 수정
      description: 현재 인증된 사용자의 프로필 정보를 수정합니다.
      operationId: updateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserProfileRequest"
        required: true
      responses:
        "200":
          description: 프로필 수정 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUnit"
  /api/places/{placeId}/fields:
    put:
      tags:
      - 장소카드
      summary: 실시간 정보 행 upsert
      description: 같은 label이면 값·신선도를 갱신합니다 (제보). 투표 집계는 유지됩니다.
      operationId: upsertLiveField
      parameters:
      - name: placeId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertLiveFieldRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseLiveFieldResponse"
  /api/photo-requests/{requestId}/submissions/{submissionId}/review:
    put:
      tags:
      - 제출 리뷰
      summary: 리뷰 수정
      description: 작성한 리뷰를 수정합니다. 리뷰 작성자만 수정할 수 있습니다.
      operationId: updateReview-WqCzmk8
      parameters:
      - name: requestId
        in: path
        description: 촬영 의뢰 ID
        required: true
        schema:
          type: string
      - name: submissionId
        in: path
        description: 제출 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubmissionReviewRequest"
        required: true
      responses:
        "200":
          description: 리뷰 수정 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseSubmissionReviewResponse"
    post:
      tags:
      - 제출 리뷰
      summary: 리뷰 작성
      description: "채택된 제출에 대해 리뷰를 작성합니다. 의뢰자만 작성할 수 있으며, 제출당 하나의 리뷰만 허용됩니다."
      operationId: createReview-WqCzmk8
      parameters:
      - name: requestId
        in: path
        description: 촬영 의뢰 ID
        required: true
        schema:
          type: string
      - name: submissionId
        in: path
        description: 제출 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionReviewRequest"
        required: true
      responses:
        "201":
          description: 리뷰 작성 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseSubmissionReviewResponse"
  /api/admin/users/{id}/profile:
    put:
      tags:
      - Admin
      operationId: modifyProfile-2iI4lOo
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifyUserProfileRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUnit"
  /api/upload/publish:
    post:
      tags:
      - 업로드
      summary: Photo 생성 및 공개
      description: "\n            업로드 완료된 파일을 Photo 레코드로 생성하여 공개합니다.\n           \
        \ /complete 엔드포인트가 선행되어야 합니다.\n        "
      operationId: publishPhoto
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishPhotoRequest"
        required: true
      responses:
        "200":
          description: Photo 생성 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseAccessUrl"
  /api/upload/presigned-url:
    post:
      tags:
      - 업로드
      summary: 사전 서명된 업로드 URL 발급
      description: 파일 업로드를 위한 사전 서명된 URL을 발급합니다.
      operationId: presignedUrl
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignedUrlRequest"
        required: true
      responses:
        "200":
          description: URL 발급 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponsePresignedUrlResponse"
  /api/upload/complete:
    post:
      tags:
      - 업로드
      summary: 업로드 완료 마킹
      description: "\n            GCS 업로드 후 업로드 완료를 마킹합니다.\n            Photo 레코드는\
        \ 생성되지 않습니다 (Privacy-First 설계).\n            Photo를 생성하려면 /publish 엔드포인트를\
        \ 호출하세요.\n        "
      operationId: completeUpload
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteUploadRequest"
        required: true
      responses:
        "200":
          description: 업로드 완료 마킹 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUnit"
  /api/topics:
    post:
      tags:
      - 테마
      summary: 테마 생성
      description: 유저 테마 생성. CANDIDATE 상태로 시작하며 승격 전까지 트렌딩/렌즈에 노출되지 않습니다.
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterTopicRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseTopicResponse"
  /api/topics/{topicId}/stamps/completion-cert:
    post:
      tags:
      - 스탬프 투어
      summary: 완료 인증 전송
      description: 완주(전 스팟 인증) 후 생성자에게 완료 인증을 보냅니다. 멱등.
      operationId: sendCompletionCert
      parameters:
      - name: topicId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseStampCompletionResponse"
  /api/topics/{topicId}/spots/{spotId}/stamps:
    post:
      tags:
      - 스탬프 투어
      summary: 스팟 사진 인증 (스탬프 획득)
      description: 스팟 반경(기본 100m) 내에서 발행한 본인 사진으로 인증합니다. 이미 인증한 스팟이면 멱등 (기존 스탬프 유지).
        전 스팟 인증 시 완주가 기록됩니다.
      operationId: certify
      parameters:
      - name: topicId
        in: path
        required: true
        schema:
          type: string
      - name: spotId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CertifyStampRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseStampProgressResponse"
  /api/topics/{topicId}/places:
    get:
      tags:
      - 테마
      summary: 테마의 장소카드 목록
      description: 사진수 내림차순
      operationId: listPlaces
      parameters:
      - name: topicId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponsePlaceListResponse"
    post:
      tags:
      - 테마
      summary: 테마에 장소카드 등록
      description: 테마에 장소카드(핀)를 추가합니다.
      operationId: addPlace
      parameters:
      - name: topicId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPlaceRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponsePlaceResponse"
  /api/topics/{topicId}/like:
    post:
      tags:
      - 테마 반응
      summary: 테마 좋아요 토글
      description: 테마에 좋아요를 추가하거나 취소합니다.
      operationId: toggleLike
      parameters:
      - name: topicId
        in: path
        description: 테마 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseToggleTopicLikeResponse"
  /api/topics/{topicId}/comments:
    get:
      tags:
      - 테마 댓글
      summary: 테마 댓글 목록 조회
      description: 테마의 최상위 댓글 목록을 커서 기반 페이징으로 조회합니다. (최신순)
      operationId: getComments
      parameters:
      - name: topicId
        in: path
        description: 테마 ID
        required: true
        schema:
          type: string
      - name: cursor
        in: query
        description: 페이지네이션 커서
        required: false
        schema:
          type: string
      - name: size
        in: query
        description: 페이지 크기
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseCommentPageResponse"
    post:
      tags:
      - 테마 댓글
      summary: 테마 댓글 작성
      description: 테마에 댓글 또는 답글을 작성합니다.
      operationId: createComment
      parameters:
      - name: topicId
        in: path
        description: 테마 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseCommentResponse"
  /api/topics/{topicId}/bookmark:
    post:
      tags:
      - 테마 반응
      summary: 테마 북마크 토글
      description: 테마를 북마크에 추가하거나 제거합니다. 좋아요와 독립적으로 동작합니다.
      operationId: toggleBookmark
      parameters:
      - name: topicId
        in: path
        description: 테마 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseToggleTopicBookmarkResponse"
  /api/storage/presigned-url:
    post:
      tags:
      - 스토리지
      summary: 사전 서명된 업로드 URL 발급
      description: 파일 업로드를 위한 사전 서명된 URL을 발급합니다.
      operationId: presignedUrl_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignedUrlRequest"
        required: true
      responses:
        "200":
          description: URL 발급 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponsePresignedUrlResponse"
  /api/storage/complete:
    post:
      tags:
      - 스토리지
      summary: 업로드 완료 마킹
      description: "\n            GCS 업로드 후 업로드 완료를 마킹합니다.\n            Photo 레코드는\
        \ 생성되지 않습니다 (Privacy-First 설계).\n            Photo를 생성하려면 /api/photos/publish\
        \ 엔드포인트를 호출하세요.\n        "
      operationId: completeUpload_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteUploadRequest"
        required: true
      responses:
        "200":
          description: 업로드 완료 마킹 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUnit"
  /api/shutter/convert:
    post:
      tags:
      - Shutter
      summary: Shots를 Film으로 환전
      description: "환전 가능한 Shots(현재 Shots - 기 환전분, 기본 100 제외)를 1:1로 Film으로 전환합니다.\
        \ Shots 점수 자체는 차감되지 않으며 환전 워터마크만 전진합니다."
      operationId: convertShots
      responses:
        "200":
          description: 환전 성공 (환전 가능량이 0이면 convertedAmount=0)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseConvertShotsResponse"
        "401":
          description: 인증 필요
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseConvertShotsResponse"
  /api/places/fields/{fieldId}/votes:
    post:
      tags:
      - 장소카드
      summary: 실시간 정보 행 투표
      description: "맞아요/아니에요 — 유저당 필드당 1표, 재투표 시 전환"
      operationId: voteLiveField
      parameters:
      - name: fieldId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteLiveFieldRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseLiveFieldResponse"
  /api/photos/{photoId}/like:
    post:
      tags:
      - 반응
      summary: 좋아요 토글
      description: 사진에 좋아요를 추가하거나 취소합니다. 싫어요가 되어있는 경우 자동으로 취소됩니다.
      operationId: toggleLike-lYrMTg8
      parameters:
      - name: photoId
        in: path
        description: 사진 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseToggleLikeResponse"
  /api/photos/{photoId}/dislike:
    post:
      tags:
      - 반응
      summary: 싫어요 토글
      description: 사진에 싫어요를 추가하거나 취소합니다. 좋아요가 되어있는 경우 자동으로 취소됩니다.
      operationId: toggleDislike-lYrMTg8
      parameters:
      - name: photoId
        in: path
        description: 사진 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseToggleDislikeResponse"
  /api/photos/{photoId}/comments:
    get:
      tags:
