          type: string
          description: 정보 값
          example: "6,000원"
          maxLength: 200
          minLength: 0
      required:
      - label
      - value
    BaseResponseLiveFieldResponse:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          $ref: "#/components/schemas/LiveFieldResponse"
          description: 응답 본문
      required:
      - header
    LiveFieldResponse:
      type: object
      description: 실시간 정보 행 응답 (freshness = updatedAt)
      properties:
        id:
          type: string
        label:
          type: string
        value:
          type: string
        confirmCount:
          type: integer
          format: int32
        denyCount:
