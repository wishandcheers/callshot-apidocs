          example: 200
        errorMessage:
          type: string
          description: 에러 메시지 (실패 시)
          example: 잘못된 요청입니다
      required:
      - code
      - success
    UserSettingsResponse:
      type: object
      description: 사용자 설정 응답
      properties:
        pushEnabled:
          type: boolean
          description: 푸시 알림 허용 여부
        emailEnabled:
          type: boolean
          description: 이메일 알림 허용 여부
        missionEnabled:
          type: boolean
          description: 미션 알림 허용 여부
        profilePublic:
          type: boolean
          description: 프로필 공개 여부
        locationVisible:
          type: boolean
          description: 위치 정보 공개 여부
        emailPublic:
          type: boolean
