          example: 4
          maximum: 5
          minimum: 1
        content:
          type: string
          description: 리뷰 내용
          example: 수정된 리뷰 내용
          maxLength: 1000
          minLength: 0
      required:
      - rating
    BaseResponseSubmissionReviewResponse:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          $ref: "#/components/schemas/SubmissionReviewResponse"
          description: 응답 본문
      required:
      - header
    SubmissionReviewResponse:
      type: object
      description: 리뷰 응답
