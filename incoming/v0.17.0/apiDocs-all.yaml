openapi: 3.1.0
info:
  title: CallShot API
  description: |
    # API Guide
    This is a Api alpha-server for CallShot App.

    ## Common Rules
    - 인증이 필요한 API는 `Authorization: Bearer {id_token}` 헤더를 포함해야 합니다.

    ## CDN Guide
    - CDN URL 형식: `https://{cdn_host}/{path}`
        - cdn_host: `dev-cdn.call-shot.com`
    - Original URL path: `/origin/{file_path}`
        - ex: https://dev-cdn.call-shot.com/origin/times_square.jpg
    - Thumbnail URL path: /thumb/{file_path}?w={size}
        - Thumbnail URL의 경우 QueryString 없이 내려감
        - size: 썸네일 크기
        - ex: https://dev-cdn.call-shot.com/thumb/callshot/times_square.jpg?w=200
  version: 0.17.0
servers:
- url: https://dev-api.call-shot.com
  description: Development server
- url: http://localhost:8080
  description: Local server
tags:
- name: 개인 사진
  description: 개인 사진 관리 API (인증 필요)
- name: 즐겨찾기
  description: 즐겨찾기 목록 API
- name: 공개 프로필
  description: 공개 사용자 프로필 API
- name: 업로드
  description: 파일 업로드 관련 API
- name: 제출 리뷰
  description: 제출물 리뷰(별점) API
- name: 공개 사진
  description: 공개 사진 브라우징 API (인증 불필요)
- name: 인증
  description: 사용자 인증 관련 API
- name: 스토리지
  description: 파일 스토리지 관련 API
- name: 임시저장 사진
  description: 임시저장 사진 워크플로우 API (소유자 권한)
- name: 댓글
  description: 댓글 API
- name: 해시태그
  description: 해시태그 관련 API
- name: Shutter
  description: 사용자 Shots 정보 API
- name: 공개 리뷰
  description: 공개 리뷰 조회 API
- name: 내 촬영 의뢰
  description: 촬영 의뢰 관리 API (인증 필요)
- name: Admin
  description: 관리자 전용 API
- name: 반응
  description: "사진 좋아요, 싫어요 API"
- name: 촬영 의뢰
  description: 촬영 의뢰 조회 API
- name: Admin 미션
  description: 관리자 시스템 미션 관리 API
- name: 탐색
  description: Explore 피드 API
paths:
  /api/profile:
    get:
      tags:
      - 인증
      summary: 사용자 프로필 조회
      description: 현재 인증된 사용자의 프로필 정보를 조회합니다.
      operationId: profile
      responses:
        "200":
          description: 프로필 조회 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUserProfileResponse"
    put:
      tags:
      - 인증
      summary: 프로필 수정
      description: 현재 인증된 사용자의 프로필 정보를 수정합니다.
      operationId: updateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserProfileRequest"
        required: true
      responses:
        "200":
          description: 프로필 수정 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUnit"
  /api/photo-requests/{requestId}/submissions/{submissionId}/review:
    put:
      tags:
      - 제출 리뷰
      summary: 리뷰 수정
      description: 작성한 리뷰를 수정합니다. 리뷰 작성자만 수정할 수 있습니다.
      operationId: updateReview
      parameters:
      - name: requestId
        in: path
        description: 촬영 의뢰 ID
        required: true
        schema:
          type: string
      - name: submissionId
        in: path
        description: 제출 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubmissionReviewRequest"
        required: true
      responses:
        "200":
          description: 리뷰 수정 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseSubmissionReviewResponse"
    post:
      tags:
      - 제출 리뷰
      summary: 리뷰 작성
      description: "채택된 제출에 대해 리뷰를 작성합니다. 의뢰자만 작성할 수 있으며, 제출당 하나의 리뷰만 허용됩니다."
      operationId: createReview
      parameters:
      - name: requestId
        in: path
        description: 촬영 의뢰 ID
        required: true
        schema:
          type: string
      - name: submissionId
        in: path
        description: 제출 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionReviewRequest"
        required: true
      responses:
        "201":
          description: 리뷰 작성 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseSubmissionReviewResponse"
  /api/admin/users/{id}/profile:
    put:
      tags:
      - Admin
      operationId: modifyProfile
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifyUserProfileRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUnit"
  /api/upload/publish:
    post:
      tags:
      - 업로드
      summary: Photo 생성 및 공개
      description: "\n            업로드 완료된 파일을 Photo 레코드로 생성하여 공개합니다.\n           \
        \ /complete 엔드포인트가 선행되어야 합니다.\n        "
      operationId: publishPhoto
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishPhotoRequest"
        required: true
      responses:
        "200":
          description: Photo 생성 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseAccessUrl"
  /api/upload/presigned-url:
    post:
      tags:
      - 업로드
      summary: 사전 서명된 업로드 URL 발급
      description: 파일 업로드를 위한 사전 서명된 URL을 발급합니다.
      operationId: presignedUrl
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignedUrlRequest"
        required: true
      responses:
        "200":
          description: URL 발급 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponsePresignedUrlResponse"
  /api/upload/complete:
    post:
      tags:
      - 업로드
      summary: 업로드 완료 마킹
      description: "\n            GCS 업로드 후 업로드 완료를 마킹합니다.\n            Photo 레코드는\
        \ 생성되지 않습니다 (Privacy-First 설계).\n            Photo를 생성하려면 /publish 엔드포인트를\
        \ 호출하세요.\n        "
      operationId: completeUpload
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteUploadRequest"
        required: true
      responses:
        "200":
          description: 업로드 완료 마킹 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUnit"
  /api/storage/presigned-url:
    post:
      tags:
      - 스토리지
      summary: 사전 서명된 업로드 URL 발급
      description: 파일 업로드를 위한 사전 서명된 URL을 발급합니다.
      operationId: presignedUrl_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignedUrlRequest"
        required: true
      responses:
        "200":
          description: URL 발급 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponsePresignedUrlResponse"
  /api/storage/complete:
    post:
      tags:
      - 스토리지
      summary: 업로드 완료 마킹
      description: "\n            GCS 업로드 후 업로드 완료를 마킹합니다.\n            Photo 레코드는\
        \ 생성되지 않습니다 (Privacy-First 설계).\n            Photo를 생성하려면 /api/photos/publish\
        \ 엔드포인트를 호출하세요.\n        "
      operationId: completeUpload_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteUploadRequest"
        required: true
      responses:
        "200":
          description: 업로드 완료 마킹 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUnit"
  /api/photos/{photoId}/like:
    post:
      tags:
      - 반응
      summary: 좋아요 토글
      description: 사진에 좋아요를 추가하거나 취소합니다. 싫어요가 되어있는 경우 자동으로 취소됩니다.
      operationId: toggleLike
      parameters:
      - name: photoId
        in: path
        description: 사진 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseToggleLikeResponse"
  /api/photos/{photoId}/dislike:
    post:
      tags:
      - 반응
      summary: 싫어요 토글
      description: 사진에 싫어요를 추가하거나 취소합니다. 좋아요가 되어있는 경우 자동으로 취소됩니다.
      operationId: toggleDislike
      parameters:
      - name: photoId
        in: path
        description: 사진 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseToggleDislikeResponse"
  /api/photos/{photoId}/comments:
    get:
      tags:
      - 댓글
      summary: 댓글 목록 조회
      description: 사진의 최상위 댓글 목록을 커서 기반 페이징으로 조회합니다. (최신순)
      operationId: getComments
      parameters:
      - name: photoId
        in: path
        description: 사진 ID
        required: true
        schema:
          type: string
      - name: cursor
        in: query
        description: 페이지네이션 커서
        required: false
        schema:
          type: string
      - name: size
        in: query
        description: 페이지 크기
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseCommentPageResponse"
    post:
      tags:
      - 댓글
      summary: 댓글 작성
      description: 사진에 댓글 또는 답글을 작성합니다.
      operationId: createComment
      parameters:
      - name: photoId
        in: path
        description: 사진 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseCommentResponse"
  /api/photos/{photoId}/bookmark:
    post:
      tags:
      - 반응
      summary: 즐겨찾기 토글
      description: 사진을 즐겨찾기에 추가하거나 제거합니다.
      operationId: toggleBookmark
      parameters:
      - name: photoId
        in: path
        description: 사진 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseToggleBookmarkResponse"
  /api/photo-requests/{requestId}/submissions:
    post:
      tags:
      - 촬영 의뢰
      summary: 촬영 의뢰에 사진 제출
      description: 촬영 의뢰에 자신의 사진을 제출합니다.
      operationId: submitPhoto
      parameters:
      - name: requestId
        in: path
        description: 촬영 의뢰 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitPhotoRequest"
        required: true
      responses:
        "200":
          description: 제출 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseSubmissionResponse"
  /api/my/photo-requests:
    get:
      tags:
      - 내 촬영 의뢰
      summary: 내 촬영 의뢰 목록 조회
      description: 내가 생성한 촬영 의뢰 목록을 커서 기반 페이징으로 조회합니다.
      operationId: getMyPhotoRequests
      parameters:
      - name: status
        in: query
        description: 의뢰 상태 필터
        required: false
        schema:
          type: string
          enum:
          - OPEN
          - CLOSED
          - FULFILLED
          - CANCELLED
          - EXPIRED
      - name: cursorRequest
        in: query
        description: 커서 기반 페이지네이션 파라미터
        required: true
        schema:
          $ref: "#/components/schemas/PhotoRequestCursorRequest"
      responses:
        "200":
          description: 조회 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseMyPhotoRequestsResponse"
    post:
      tags:
      - 내 촬영 의뢰
      summary: 촬영 의뢰 생성
      description: 새로운 촬영 의뢰를 생성합니다.
      operationId: createPhotoRequest
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePhotoRequestRequest"
        required: true
      responses:
        "200":
          description: 생성 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponsePhotoRequestResponse"
  /api/my/photo-requests/{requestId}/submissions/{submissionId}/review:
    post:
      tags:
      - 내 촬영 의뢰
      summary: 제출 검토 (채택/거절)
      description: 제출된 사진을 검토하여 채택하거나 거절합니다. 의뢰 소유자만 검토할 수 있습니다.
      operationId: reviewSubmission
      parameters:
      - name: requestId
        in: path
        description: 촬영 의뢰 ID
        required: true
        schema:
          type: string
      - name: submissionId
        in: path
        description: 제출 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewSubmissionRequest"
        required: true
      responses:
        "200":
          description: 검토 완료
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseSubmissionResponse"
  /api/my/photo-requests/{id}/close:
    post:
      tags:
      - 내 촬영 의뢰
      summary: 촬영 의뢰 마감
      description: 촬영 의뢰를 마감 처리합니다. OPEN 상태인 의뢰만 마감할 수 있습니다.
      operationId: closePhotoRequest
      parameters:
      - name: id
        in: path
        description: 촬영 의뢰 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: 마감 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponsePhotoRequestResponse"
  /api/my/drafts/{id}/publish:
    post:
      tags:
      - 임시저장 사진
      summary: 임시저장 사진 발행
      description: 임시저장 사진을 발행된 사진으로 변환합니다. 모든 필수 필드가 입력되어야 합니다.
      operationId: publishDraftPhoto
      parameters:
      - name: id
        in: path
        description: 임시저장 사진 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: 발행 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponsePhotoResponse"
  /api/admin/missions:
    get:
      tags:
      - Admin 미션
      summary: 시스템 미션 목록 조회
      description: 모든 시스템 미션 목록을 조회합니다.
      operationId: getSystemMissions
      responses:
        "200":
          description: 조회 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseSystemMissionsResponse"
    post:
      tags:
      - Admin 미션
      summary: 시스템 미션 생성
      description: "새로운 시스템 미션을 생성합니다. source=SYSTEM, requesterId=시스템 사용자로 자동 설정됩니\
        다."
      operationId: createSystemMission
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSystemMissionRequest"
        required: true
      responses:
        "200":
          description: 생성 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseSystemMissionResponse"
  /api/admin/missions/{missionId}/submissions/{submissionId}/review:
    post:
      tags:
      - Admin 미션
      summary: 시스템 미션 제출 검토
      description: 시스템 미션에 대한 제출을 채택 또는 거절합니다.
      operationId: reviewSubmission_1
      parameters:
      - name: missionId
        in: path
        description: 미션 ID
        required: true
        schema:
          type: string
      - name: submissionId
        in: path
        description: 제출 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewSystemMissionSubmissionRequest"
        required: true
      responses:
        "200":
          description: 검토 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUnit"
  /api/admin/missions/{id}/close:
    post:
      tags:
      - Admin 미션
      summary: 시스템 미션 마감
      description: 시스템 미션을 마감 처리합니다. OPEN 상태인 미션만 마감할 수 있습니다.
      operationId: closeMission
      parameters:
      - name: id
        in: path
        description: 미션 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: 마감 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUnit"
  /api/photos/{photoId}/comments/{commentId}:
    delete:
      tags:
      - 댓글
      summary: 댓글 삭제
      description: 작성한 댓글을 삭제합니다. (소프트 삭제)
      operationId: deleteComment
      parameters:
      - name: photoId
        in: path
        description: 사진 ID
        required: true
        schema:
          type: string
      - name: commentId
        in: path
        description: 댓글 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUnit"
    patch:
      tags:
      - 댓글
      summary: 댓글 수정
      description: 작성한 댓글 내용을 수정합니다.
      operationId: updateComment
      parameters:
      - name: photoId
        in: path
        description: 사진 ID
        required: true
        schema:
          type: string
      - name: commentId
        in: path
        description: 댓글 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseCommentResponse"
  /api/my/photos/{id}:
    get:
      tags:
      - 개인 사진
      summary: 발행된 사진 상세 조회
      description: 특정 발행된 사진의 상세 정보를 조회합니다. 사진 소유자만 조회 가능합니다.
      operationId: getPublishedPhoto
      parameters:
      - name: id
        in: path
        description: 발행된 사진 ID
