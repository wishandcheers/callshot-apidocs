        "200":
          description: 조회 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponsePublishedPhotosResponse"
  /api/my/photo-requests/{id}/submissions:
    get:
      tags:
      - 내 촬영 의뢰
      summary: 의뢰에 대한 제출 목록 조회
      description: 내 촬영 의뢰에 대한 제출 목록을 조회합니다. 의뢰 소유자만 조회할 수 있습니다.
      operationId: getSubmissionsForRequest
      parameters:
      - name: id
        in: path
        description: 촬영 의뢰 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: 조회 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseRequestSubmissionsResponse"
  /api/my/drafts:
    get:
      tags:
      - 임시저장 사진
      summary: 임시저장 사진 목록 조회
      description: 내가 업로드한 임시저장 사진들을 커서 기반 페이징으로 조회합니다.
      operationId: getMyDraftPhotos
      parameters:
      - name: request
        in: query
        description: 커서 기반 페이지네이션 파라미터
        required: true
        schema:
          $ref: "#/components/schemas/CursorPhotosRequest"
      responses:
        "200":
          description: 조회 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDraftPhotosResponse"
  /api/my/bookmarks:
    get:
      tags:
      - 즐겨찾기
      summary: 즐겨찾기 목록 조회
      description: 내가 즐겨찾기한 사진 목록을 커서 기반 페이징으로 조회합니다.
      operationId: getMyBookmarks
      parameters:
      - name: cursor
        in: query
        description: 페이지네이션 커서
        required: false
        schema:
          type: string
      - name: size
        in: query
        description: 페이지 크기
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      - name: direction
        in: query
        description: 페이지네이션 방향
        required: false
        schema:
          type: string
          default: FORWARD
          enum:
          - FORWARD
          - BACKWARD
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseBookmarkedPhotosResponse"
  /api/hashtags:
    get:
      tags:
      - 해시태그
      summary: 해시태그 검색
      description: 키워드를 포함하는 해시태그를 검색합니다.
      operationId: searchHashtags
      parameters:
      - name: request
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/SearchHashtagRequest"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseSearchHashtagResponse"
  /api/hashtags/{name}:
    get:
      tags:
      - 해시태그
      summary: 해시태그 이름으로 조회
      description: 주어진 이름과 정확히 일치하는 해시태그를 조회합니다.
      operationId: findByName
      parameters:
      - name: name
        in: path
        description: 조회할 해시태그 이름
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseHashtagResponse"
  /api/hashtags/top10:
    get:
      tags:
      - 해시태그
      summary: 사용량 기준 상위 10개 해시태그 조회
      description: 가장 많이 사용된 해시태그 10개를 조회합니다.
      operationId: top10ByUsageCount
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseTop10HashtagsResponse"
  /api/explore/photos:
    get:
      tags:
      - 탐색
      summary: Explore 피드 조회
      description: 지정된 위치 반경 내의 사진을 발견 점수 기반으로 조회합니다.
      operationId: getExploreFeed
      parameters:
      - name: latitude
        in: query
        description: 중심 위도
        required: true
        schema:
          type: number
          format: double
        example: 37.5665
      - name: longitude
        in: query
        description: 중심 경도
        required: true
        schema:
          type: number
          format: double
        example: 126.978
      - name: radiusMeters
        in: query
        description: "검색 반경 (미터, 100~50000)"
        required: false
        schema:
          type: integer
          format: int32
          default: 5000
        example: 5000
      - name: cursor
        in: query
        description: 페이지네이션 커서
        required: false
        schema:
          type: string
      - name: size
        in: query
        description: 페이지 크기 (1~100)
        required: false
        schema:
          type: integer
          format: int32
          default: 20
        example: 20
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseCursorPageExplorePhotoResponse"
  /api/admin/users:
    get:
      tags:
      - Admin
      operationId: findAll
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
          maximum: 9223372036854775807
          minimum: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 50
          maximum: 9223372036854775807
          minimum: 0
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseListUserDetailsResult"
  /api/admin/users/{id}:
    get:
      tags:
      - Admin
      operationId: findById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUserDetailsResponse"
  /api/signout:
    delete:
      tags:
      - 인증
      summary: 사용자 탈퇴
      description: 현재 인증된 사용자의 프로필 정보를 삭제합니다. (개발용)
      operationId: signout
      responses:
        "200":
          description: 사용자 탈퇴 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseUnit"
  /api/photo-requests/{requestId}/submissions/{submissionId}:
    delete:
      tags:
      - 촬영 의뢰
      summary: 사진 제출 철회
      description: 촬영 의뢰에 제출한 사진을 철회합니다. PENDING 상태인 제출만 철회할 수 있습니다.
      operationId: withdrawSubmission
      parameters:
      - name: requestId
        in: path
        description: 촬영 의뢰 ID
        required: true
        schema:
          type: string
      - name: submissionId
        in: path
        description: 제출 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: 철회 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseSubmissionResponse"
components:
  schemas:
    UpdateUserProfileRequest:
      type: object
      description: 프로필 수정 요청 정보
      properties:
        nickname:
          type: string
          description: 닉네임
          example: callshot_user
          maxLength: 50
          minLength: 0
        avatarUrl:
          type: string
          description: 아바타 이미지 URL
        gender:
          type: string
          description: 성별
          enum:
          - MALE
          - FEMALE
          - UNKNOWN
          example: MALE
        birthdate:
          type: string
          format: date
          description: 생년월일
          example: 1995-03-15
        bio:
          type: string
          description: 자기소개
          example: 사진 찍는 걸 좋아합니다
      required:
      - nickname
    BaseResponseUnit:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          description: 응답 본문
      required:
      - header
    ResponseHeader:
      type: object
      description: 응답 헤더
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        code:
          type: integer
          format: int32
          description: HTTP 상태 코드
          example: 200
        errorMessage:
          type: string
          description: 에러 메시지 (실패 시)
          example: 잘못된 요청입니다
      required:
      - code
      - success
    UpdateSubmissionReviewRequest:
      type: object
      description: 리뷰 수정 요청
      properties:
        rating:
          type: integer
          format: int32
          description: 별점 (1-5)
          example: 4
          maximum: 5
          minimum: 1
        content:
          type: string
          description: 리뷰 내용
          example: 수정된 리뷰 내용
          maxLength: 1000
          minLength: 0
      required:
      - rating
    BaseResponseSubmissionReviewResponse:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          $ref: "#/components/schemas/SubmissionReviewResponse"
          description: 응답 본문
      required:
      - header
    SubmissionReviewResponse:
      type: object
      description: 리뷰 응답
      properties:
        id:
          type: string
          description: 리뷰 ID
        submissionId:
          type: string
          description: 제출물 ID
        rating:
          type: integer
          format: int32
          description: 별점
        content:
          type: string
          description: 리뷰 내용
        reviewerId:
          type: string
          description: 작성자 ID
        createdAt:
          type: string
          format: date-time
          description: 작성일시
        updatedAt:
          type: string
          format: date-time
          description: 수정일시
      required:
      - createdAt
      - id
      - rating
      - reviewerId
      - submissionId
      - updatedAt
    ModifyUserProfileRequest:
      type: object
      description: 프로필 수정 요청 (관리자)
      properties:
        nickname:
          type: string
          description: 닉네임
          example: callshot_user
        avatarUrl:
          type: string
          description: 아바타 이미지 URL
        gender:
          type: string
          description: 성별
          enum:
          - MALE
          - FEMALE
          - UNKNOWN
          example: MALE
        birthdate:
          type: string
          format: date
          description: 생년월일
          example: 1995-03-15
        bio:
          type: string
          description: 자기소개
      required:
      - nickname
    PublishPhotoRequest:
      type: object
      description: Photo 생성 요청 (사진 메타데이터)
      properties:
        objectKey:
          type: string
          description: presigned URL 발급 시 받은 파일 키
          example: callshot/photos/abc123.jpg
        type:
          type: string
          description: 사진 유형
          enum:
          - STANDARD
          - SPHERICAL_360
          - PANORAMA
          - VIRTUAL_TOUR
          example: STANDARD
        width:
          type: integer
          format: int32
          description: 이미지 너비 (px)
          example: 1920
        height:
          type: integer
          format: int32
          description: 이미지 높이 (px)
          example: 1080
        longitude:
          type: number
          format: double
          description: GPS 경도
          example: 126.978
        latitude:
          type: number
          format: double
          description: GPS 위도
          example: 37.5665
        altitude:
          type: number
          format: double
          description: GPS 고도 (미터)
          example: 45.5
        direction:
          type: number
          format: double
          description: "촬영 방향 (라디안, 북쪽 기준 시계방향)"
          example: 1.5708
        description:
          type: string
          description: 사진 설명
          example: 서울 남산타워에서 촬영
        hashtags:
          type: array
          description: 해시태그 목록
          example:
          - 서울
          - 남산타워
          items:
            type: string
      required:
      - hashtags
      - height
      - objectKey
      - type
      - width
    AccessUrl:
      type: object
      properties:
        accessUrl:
          type: string
        expiresAt:
          type: integer
          format: int64
      required:
      - accessUrl
    BaseResponseAccessUrl:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          $ref: "#/components/schemas/AccessUrl"
          description: 응답 본문
      required:
      - header
    PresignedUrlRequest:
      type: object
      description: UPLOAD URL 발급 요청 정보
      properties:
        fileName:
          type: string
          description: 업로드할 파일명
          example: photo_001.jpg
        contentType:
          type: string
          description: 파일 MIME 타입
          example: image/jpeg
      required:
      - contentType
      - fileName
    BaseResponsePresignedUrlResponse:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          $ref: "#/components/schemas/PresignedUrlResponse"
          description: 응답 본문
      required:
      - header
    PresignedUrlResponse:
      type: object
      description: Presigned URL 발급 응답
      properties:
        uploadUrl:
          type: string
          description: GCS 업로드용 presigned URL
        fileKey:
          type: string
          description: 업로드 파일 키 (업로드 완료 시 사용)
          example: callshot/photos/abc123.jpg
        expiresAt:
          type: string
          description: URL 만료 시각 (epoch millis)
          example: 1708300800000
      required:
      - expiresAt
      - fileKey
      - uploadUrl
    CompleteUploadRequest:
      type: object
      description: 업로드 완료 요청 (objectKey)
      properties:
        objectKey:
          type: string
          description: presigned URL 발급 시 받은 파일 키
          example: callshot/photos/abc123.jpg
      required:
      - objectKey
    BaseResponseToggleLikeResponse:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          $ref: "#/components/schemas/ToggleLikeResponse"
          description: 응답 본문
      required:
      - header
    ToggleLikeResponse:
      type: object
      description: 좋아요 토글 결과
      properties:
        isLiked:
          type: boolean
          description: "좋아요 상태 (true: 좋아요됨, false: 좋아요 취소됨)"
        likeCount:
          type: string
          description: 현재 좋아요 수
      required:
      - isLiked
      - likeCount
    BaseResponseToggleDislikeResponse:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          $ref: "#/components/schemas/ToggleDislikeResponse"
          description: 응답 본문
      required:
      - header
    ToggleDislikeResponse:
      type: object
      description: 싫어요 토글 결과
      properties:
        isDisliked:
          type: boolean
          description: "싫어요 상태 (true: 싫어요됨, false: 싫어요 취소됨)"
        dislikeCount:
          type: string
          description: 현재 싫어요 수
      required:
      - dislikeCount
      - isDisliked
    CreateCommentRequest:
      type: object
      description: 댓글 작성 요청
      properties:
        content:
          type: string
          description: 댓글 내용
          example: 멋진 사진이네요!
          maxLength: 500
          minLength: 0
        parentId:
          type: integer
          format: int64
          description: 부모 댓글 ID (답글인 경우)
      required:
      - content
    BaseResponseCommentResponse:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          $ref: "#/components/schemas/CommentResponse"
          description: 응답 본문
      required:
      - header
    CommentResponse:
      type: object
      description: 댓글 응답
      properties:
        id:
          type: string
          description: 댓글 ID
        targetId:
          type: string
          description: 대상 ID
        parentId:
          type: integer
          format: int64
          description: 부모 댓글 ID
        userId:
          type: string
          description: 작성자 ID
        nickname:
          type: string
          description: 작성자 닉네임
        avatarUrl:
          type: string
          description: 작성자 아바타 URL
        content:
          type: string
          description: 댓글 내용 (삭제된 경우 빈 문자열)
        replyCount:
          type: integer
          format: int32
          description: 답글 수
        isDeleted:
          type: boolean
          description: 삭제 여부
        createdAt:
          type: string
          format: date-time
          description: 작성 일시
        updatedAt:
          type: string
          format: date-time
          description: 수정 일시
      required:
      - content
      - createdAt
      - id
      - isDeleted
      - nickname
      - replyCount
      - targetId
      - updatedAt
      - userId
    BaseResponseToggleBookmarkResponse:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          $ref: "#/components/schemas/ToggleBookmarkResponse"
          description: 응답 본문
      required:
      - header
    ToggleBookmarkResponse:
      type: object
      description: 즐겨찾기 토글 결과
      properties:
        isBookmarked:
          type: boolean
          description: "즐겨찾기 상태 (true: 즐겨찾기됨, false: 즐겨찾기 취소됨)"
        bookmarkCount:
          type: string
          description: 현재 즐겨찾기 수
      required:
      - bookmarkCount
      - isBookmarked
    SubmitPhotoRequest:
      type: object
      description: 제출 정보
      properties:
        objectKey:
          type: string
          description: 제출할 오브젝트 키 (업로드 완료 시 반환받은 키)
          example: uploads/photo-request/abc123.jpg
          minLength: 1
        width:
          type: integer
          format: int32
          description: 이미지 너비 (픽셀)
          example: 1920
          minimum: 1
        height:
          type: integer
          format: int32
          description: 이미지 높이 (픽셀)
          example: 1080
          minimum: 1
        photoType:
          type: string
          description: 사진 유형
          enum:
          - STANDARD
          - SPHERICAL_360
          - PANORAMA
          - VIRTUAL_TOUR
          example: STANDARD
        message:
          type: string
          description: 제출 메시지
          example: 요청하신 야경 사진입니다.
          maxLength: 500
          minLength: 0
      required:
      - height
      - objectKey
      - photoType
      - width
    BaseResponseSubmissionResponse:
      type: object
      description: API 공통 응답 래퍼
      properties:
        header:
          $ref: "#/components/schemas/ResponseHeader"
          description: "응답 헤더 (성공 여부, 상태 코드)"
        body:
          $ref: "#/components/schemas/SubmissionResponse"
          description: 응답 본문
      required:
      - header
    SubmissionResponse:
      type: object
      description: 제출 응답
      properties:
        id:
          type: string
        status:
          type: string
          enum:
          - PENDING
          - ACCEPTED
          - REJECTED
          - WITHDRAWN
        photoThumbnailUrl:
          type: string
        createdAtEpochMilli:
          type: string
        requestStatus:
          type: string
          enum:
          - OPEN
          - CLOSED
          - FULFILLED
          - CANCELLED
          - EXPIRED
      required:
      - createdAtEpochMilli
      - id
      - status
